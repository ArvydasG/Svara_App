<!DOCTYPE html>
<html lang="lt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Šiukšlių Grafikas – Seniavos pl. 56F</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6c63ff;
            --accent2: #a78bfa;
            --green: #22c55e;
            --yellow: #eab308;
            --blue: #3b82f6;
            --purple: #a855f7;
            --orange: #f97316;
            --text: #e2e8f0;
            --text2: #94a3b8;
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 32px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .header-title h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #6c63ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-title p {
            color: var(--text2);
            font-size: 0.88rem;
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #last-updated {
            color: var(--text2);
            font-size: 0.8rem;
        }

        #refresh-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        #refresh-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        #refresh-btn.spinning svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Loading / Error / Empty states */
        .state-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
            gap: 16px;
            color: var(--text2);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .hidden {
            display: none !important;
        }

        /* NEXT PICKUP – hero card */
        #next-pickup-hero {
            background: linear-gradient(135deg, #1e1b4b 0%, #1a1d27 60%);
            border: 1px solid rgba(108, 99, 255, 0.3);
            border-radius: var(--radius);
            padding: 32px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .days-counter {
            flex-shrink: 0;
            text-align: center;
            background: var(--accent);
            border-radius: 16px;
            padding: 20px 28px;
            min-width: 120px;
        }

        .days-counter .days-number {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
            color: white;
        }

        .days-counter .days-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 4px;
        }

        .next-info h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .next-info .next-date {
            color: var(--accent2);
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .next-info .next-type-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .type-badge {
            font-size: 0.78rem;
            padding: 4px 12px;
            border-radius: 100px;
            border: 1px solid;
            font-weight: 500;
        }

        /* Schedule grid */
        #schedule-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .pickup-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .pickup-card:hover {
            transform: translateY(-2px);
            border-color: rgba(108, 99, 255, 0.4);
        }

        .pickup-card.today {
            border-color: rgba(34, 197, 94, 0.5);
            background: rgba(34, 197, 94, 0.05);
        }

        .pickup-card.soon {
            border-color: rgba(234, 179, 8, 0.4);
        }

        .card-days {
            flex-shrink: 0;
            width: 64px;
            height: 64px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .card-days.today-bg {
            background: rgba(34, 197, 94, 0.15);
            color: var(--green);
        }

        .card-days.soon-bg {
            background: rgba(234, 179, 8, 0.12);
            color: var(--yellow);
        }

        .card-days.normal-bg {
            background: var(--surface2);
            color: var(--text2);
        }

        .card-days .d-num {
            font-size: 1.5rem;
            line-height: 1;
        }

        .card-days .d-lab {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 2px;
        }

        .card-info h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }

        .meta-chip {
            font-size: 0.72rem;
            color: var(--text2);
            background: var(--surface2);
            border-radius: 6px;
            padding: 2px 8px;
        }

        .badge-today {
            display: inline-block;
            background: var(--green);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* Color indicators for waste type */
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-mixed {
            background: #94a3b8;
        }

        .dot-plastic {
            background: #3b82f6;
        }

        .dot-glass {
            background: #22c55e;
        }

        .dot-bio {
            background: #a3e635;
        }

        .dot-paper {
            background: #f97316;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text2);
            font-weight: 600;
            margin-bottom: 16px;
        }

        button {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-title">
            <h1>🗑️ Šiukšlių Grafikas</h1>
            <p>Seniavos pl. 56F &nbsp;·&nbsp; Kauno m. sav.</p>
        </div>
        <div class="header-actions">
            <span id="last-updated"></span>
            <button id="refresh-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                Atnaujinti
            </button>
        </div>
    </header>

    <main>
        <!-- Loading -->
        <div id="loading" class="state-box">
            <div class="spinner"></div>
            <p>Kraunami duomenys…</p>
        </div>

        <!-- Error -->
        <div id="error-state" class="state-box hidden">
            <p style="font-size:2rem">⚠️</p>
            <p id="error-message">Nepavyko gauti duomenų</p>
            <button id="retry-btn" onclick="fetchData()"
                style="margin-top:8px; padding:8px 20px; background:var(--accent); border:none; color:white; border-radius:8px; cursor:pointer;">Bandyti
                vėl</button>
        </div>

        <!-- Empty -->
        <div id="empty-state" class="state-box hidden">
            <p style="font-size:2rem">🔍</p>
            <p>Nėra artimų šiukšlių išvežimų</p>
        </div>

        <!-- Hero + schedule (hidden until data) -->
        <div id="content" class="hidden">
            <!-- Next pickup hero -->
            <div id="next-pickup-hero">
                <div class="days-counter">
                    <div class="days-number" id="hero-days">–</div>
                    <div class="days-label" id="hero-days-label">dienų</div>
                </div>
                <div class="next-info">
                    <h2 id="hero-title">Kitas išvežimas</h2>
                    <div class="next-date" id="hero-date"></div>
                    <div class="next-type-badges" id="hero-badges"></div>
                </div>
            </div>

            <!-- Full schedule -->
            <div class="section-title">Visi artimiausi išvežimai</div>
            <div id="schedule-container"></div>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
