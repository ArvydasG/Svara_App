<!DOCTYPE html>
<html lang="lt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atliekų Grafikas – Seniavos pl. 56F</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- PWA integracija -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#111827">
    <link rel="apple-touch-icon" href="./icon-192x192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Švara">

    <!-- OneSignal Push Notifications -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function (OneSignal) {
            await OneSignal.init({
                appId: "9f3d18fb-2825-4a44-b306-80e21a9df9d5",
                promptOptions: {
                    slidedown: {
                        prompts: [{
                            type: "push",
                            autoPrompt: false,
                            text: {
                                actionMessage: "Norite gauti priminimus savo telefone išvakarėse prieš šiukšlių išvežimą?",
                                acceptButton: "Sutinku",
                                cancelButton: "Gal vėliau"
                            }
                        }]
                    }
                },
                notifyButton: {
                    enable: true,
                    colors: {
                        'circle.background': 'var(--accent)',
                        'circle.foreground': 'white',
                        'badge.background': 'red',
                        'badge.foreground': 'white',
                        'bullet.background': 'white',
                        'pulse.color': 'var(--accent)'
                    }
                },
                allowLocalhostAsSecureOrigin: true
            });
            OneSignal.Slidedown.promptPush();
        });
    </script>

    <style>
        :root {
            --bg: #030712;
            --surface: rgba(17, 24, 39, 0.7);
            --surface-hover: rgba(31, 41, 55, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(108, 99, 255, 0.3);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --radius-lg: 24px;
            --radius-md: 16px;
            --font: 'Inter', system-ui, -apple-system, sans-serif;

            /* Waste type colors */
            --color-mixed: #94a3b8;
            --color-plastic: #3b82f6;
            --color-glass: #10b981;
            --color-bio: #84cc16;
            --color-paper: #f97316;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            background-image:
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            padding: clamp(1rem, 5vw, 3rem);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .header-title h1 {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-top: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Hero Card */
        #next-pickup-hero {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            margin-bottom: 3.5rem;
            display: flex;
            align-items: center;
            gap: 3rem;
            position: relative;
            overflow: hidden;
        }

        #next-pickup-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .days-counter {
            width: 140px;
            height: 140px;
            background: var(--accent);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px -12px var(--accent-glow);
            flex-shrink: 0;
        }

        .days-number {
            font-size: 4rem;
            font-weight: 900;
            line-height: 1;
        }

        .days-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.1em;
            opacity: 0.8;
        }

        .next-info h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .next-date {
            color: var(--accent);
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .next-type-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .type-badge {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Grid */
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-dim);
            padding-left: 0.5rem;
        }

        #schedule-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        .pickup-card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: all 0.3s ease;
        }

        .pickup-card:hover {
            background: var(--surface-hover);
            border-color: var(--border-hover);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 30px -15px rgba(0, 0, 0, 0.5);
        }

        .card-days {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            background: rgba(255, 255, 255, 0.05);
        }

        .card-days.today-bg {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .card-days.soon-bg {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .d-num {
            font-size: 1.4rem;
            line-height: 1;
        }

        .d-lab {
            font-size: 0.65rem;
            text-transform: uppercase;
            margin-top: 2px;
            opacity: 0.7;
        }

        .card-info h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        .card-date {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin: 4px 0 10px 0;
        }

        .card-meta {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .meta-chip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 6px;
            color: var(--text-dim);
        }

        .waste-indicator {
            width: 12px;
            height: 12px;
            border-radius: 4px;
            margin-left: auto;
            box-shadow: 0 0 12px currentColor;
        }

        /* States */
        .state-box {
            text-align: center;
            padding: 4rem;
            opacity: 0.6;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Holiday Styles */
        .holiday-section {
            margin-bottom: 2rem;
        }

        #holidays-container {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .holiday-chip {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .holiday-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: #f59e0b;
        }

        .holiday-date {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .holiday-warning {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            margin: 8px 0;
            margin: 8px 0;
            display: inline-block;
        }

        /* Works Styles */
        .works-section {
            margin-bottom: 2.5rem;
        }

        #works-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .work-card {
            background: rgba(59, 130, 246, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.1);
            padding: 1.2rem;
            border-radius: 16px;
            display: flex;
            gap: 1rem;
            transition: all 0.3s ease;
        }

        .work-card:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }

        .work-icon {
            font-size: 1.5rem;
            background: rgba(59, 130, 246, 0.1);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .work-content {
            flex-grow: 1;
        }

        .work-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
            gap: 10px;
        }

        .work-header h4 {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
        }

        .work-status-badge {
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .status-planned {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }

        .work-desc {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .work-footer {
            display: flex;
            align-items: center;
        }

        .work-date {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 640px) {
            #next-pickup-hero {
                flex-direction: column;
                text-align: center;
                gap: 1.5rem;
                padding: 2rem;
            }

            .days-counter {
                width: 100px;
                height: 100px;
            }

            .days-number {
                font-size: 2.5rem;
            }

            .next-type-badges {
                justify-content: center;
            }

            header {
                justify-content: center;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-title">
            <h1>🗑️ Atliekų Grafikas</h1>
            <p>📍 Seniavos pl. 56F, Kauno m. sav.</p>
        </div>
        <div class="header-actions">
            <span id="last-updated"></span>
        </div>
    </header>

    <main>
        <!-- Loading -->
        <div id="loading" class="state-box">
            <div class="spinner"></div>
            <p>Kraunamas grafikas…</p>
        </div>

        <!-- Error -->
        <div id="error-state" class="state-box hidden">
            <p style="font-size:2.5rem; margin-bottom: 1rem;">⚠️</p>
            <p id="error-message">Nepavyko gauti duomenų</p>
            <button id="retry-btn" onclick="fetchData()"
                style="margin-top:20px; padding:12px 28px; background:var(--accent); border:none; color:white; border-radius:12px; cursor:pointer; font-weight:700;">Bandyti
                vėl</button>
        </div>

        <!-- Empty -->
        <div id="empty-state" class="state-box hidden">
            <p style="font-size:2.5rem; margin-bottom: 1rem;">🔍</p>
            <p>Nėra artimų šiukšlių išvežimų</p>
        </div>

        <!-- Content -->
        <div id="content" class="hidden">
            <div class="holiday-section hidden">
                <div class="section-title">Artėjančios šventės</div>
                <div id="holidays-container"></div>
            </div>

            <div class="works-section hidden">
                <div class="section-title">🏗️ Apylinkės darbai (2km)</div>
                <div id="works-container"></div>
            </div>

            <div id="next-pickup-hero">
                <div class="days-counter">
                    <div class="days-number" id="hero-days">–</div>
                    <div class="days-label" id="hero-days-label">...</div>
                </div>
                <div class="next-info">
                    <h2 id="hero-title">Kitas išvežimas</h2>
                    <div class="next-date" id="hero-date"></div>
                    <div class="next-type-badges" id="hero-badges"></div>
                </div>
            </div>

            <div class="section-title">Visi artimiausi išvežimai</div>
            <div id="schedule-container"></div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // PWA Service Worker registracija
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('SW registered:', registration.scope);
                    })
                    .catch(error => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>

</html>
