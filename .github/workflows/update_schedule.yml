# Automatinis šiukšlių grafiko atnaujinimas
name: Update Waste Schedule

on:
  schedule:
    - cron: '0 3 * * *' # Kasnakt 5 valandą Lietuvos laiku
  workflow_dispatch: # Leidžia paleisti rankiniu būdu

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          
      - name: Run update script
        env:
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: python update_data.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add grafikas.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automatinis duomenų atnaujinimas" && git push)
